<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Bridge</title>
</head>
<body>
    <div id="ad-slot"></div>

    <script>
        (function() {
            // 1. CLEAR FREQUENCY CAPPING DATA
            // This wipes the local markers the script uses to know it has shown an ad.
            localStorage.clear();
            sessionStorage.clear();
            
            // 2. SPOOF THE DOMAIN & REFERRER
            // The script uses 'getLocation' and 'hostname' checks. 
            // We force it to see your approved domain.
            try {
                Object.defineProperty(document, 'domain', { 
                    get: function() { return "sportsdunia.com"; } 
                });
                Object.defineProperty(document, 'referrer', { 
                    get: function() { return "https://www.sportsdunia.com/"; } 
                });
            } catch(e) {
                console.log("Spoofing notice: ", e);
            }

            // 3. BYPASS "TRACKER ID NOT FOUND"
            // We use 1542192 because it is explicitly in the 'validTrackerIds' 
            // array in the Javascript source you shared.
            const VALID_ID = "1542192";
            
            var s = document.createElement("script");
            s.id = VALID_ID; // The script looks for its own ID
            s.type = "text/javascript";
            s.setAttribute("data-tracker", VALID_ID);
            s.setAttribute("data-target", "ad-slot");
            
            // Adding a Cache-Buster (?cb=) to force a fresh load every time
            s.src = "https://scripts.cleverwebserver.com/bb8bbc863573a5296f490916b1afeca1.js?cb=" + Math.random();
            
            document.body.appendChild(s);
            
            console.log("Bridge active. Tracker ID set to: " + VALID_ID);
        })();
    </script>
</body>
</html>
